name: Schema Drift Check

on:
  pull_request:
    branches:
      - develop
      - feat/cluster-switch
    paths:
      - 'src/database/**'
      - 'src/config/database.config.ts'

jobs:
  schema-drift:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: flaxh_trade
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Reset schemas
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: password
          DATABASE_NAME: flaxh_trade
        run: bash scripts/reset-schemas.sh

      - name: Run schema drift check
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: password
          DATABASE_NAME: flaxh_trade
          DATABASE_URL: postgres://postgres:password@localhost:5432/flaxh_trade
        run: pnpm run schema:drift-check

      - name: Verify no @InjectRepository on partitioned entities
        run: bash scripts/check-no-injectrepository-partitioned.sh
