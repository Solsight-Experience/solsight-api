openapi: 3.0.0
info:
  title: Jupiter Trigger Order API
  version: 1.0.0
  description: Jupiter Trigger Order API Schema
servers:
  - url: https://api.jup.ag/trigger/v1
    description: Jupiter Trigger Order API Endpoint
security: []
paths:
  /cancelOrders:
    post:
      summary: cancelOrders
      description: >
        Request for a base64-encoded unsigned trigger order cancellation
        transaction(s) to be used in `POST /trigger/v1/execute`
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                maker:
                  type: string
                  default: jdocuPgEAjMfihABsPgKEvYtsmMzjUHeq9LX4Hvs7f3
                computeUnitPrice:
                  type: string
                  default: auto
                  description: >
                    In microlamports, defaults to 95th percentile of priority
                    fees
                orders:
                  type: array
                  items:
                    type: string
                  description: >
                    Array of orders to cancel, if none is provided, the API will
                    generate cancel instructions for all open orders belonging
                    to the maker
              required:
                - maker
              title: cancelOrdersRequestBody
              example:
                maker: jdocuPgEAjMfihABsPgKEvYtsmMzjUHeq9LX4Hvs7f3
                orders:
                  - 6fe8ByaiFHisjnYnH5qdpyiNtkn89mMBQUemRkVmKhro
                  - 9jwzPKHxcrSozdrTYzPnTqy7psRvNGxaYUAiiyxwZKjj
                computeUnitPrice:
                  type: string
                  default: auto
      responses:
        '200':
          description: >
            Returns the base64-encoded unsigned transaction(s) of all open
            orders associated to the provided "maker"

            - If no orders were specified, it will batch 5 cancel order
            instructions in 1 transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                    description: Required to make a request to `/execute`
                  transactions:
                    type: array
                    items:
                      type: string
                    description: Array of unsigned base-64 encoded transaction(s)
                required:
                  - requestId
                  - transactions
                example:
                  requestId: f7d5dd40-a416-4dae-8367-7dc10cab6554
                  transactions:
                    - >
                      
                    - >
                      
              example:
                requestId: c3d4e5f6-a7b8-9012-cdef-123456789012
                transactions:
                  - >-
                    AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgAAEN...
        '400':
          description: Bad request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: number
                  cause:
                    type: string
                  signature:
                    type: string
                    description: Signature of the transaction, if generated
                    example: >
                      38CtpugRBobyj1JMkHj9umQyj1D8q6bs1jcMRcw7Fiyp4BXv4uh4bD4TyJs6fsqYCDDfQpeRewA7HjLA1Eprc8uR
                  status:
                    type: string
                    enum:
                      - Failed
                required:
                  - error
                  - code
                example:
                  error: invalid maker pubkey
                  code: 400
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: number
                  cause:
                    type: string
                  signature:
                    type: string
                    description: Signature of the transaction, if generated
                    example: >
                      38CtpugRBobyj1JMkHj9umQyj1D8q6bs1jcMRcw7Fiyp4BXv4uh4bD4TyJs6fsqYCDDfQpeRewA7HjLA1Eprc8uR
                  status:
                    type: string
                    enum:
                      - Failed
                required:
                  - error
                  - code
                example:
                  error: something went wrong while generating cancel instructions
                  code: 500
      security:
        - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Get API key via https://portal.jup.ag